name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"
      - name: Check that the release tag matches __version__
        run: |
          tag="${GITHUB_REF_NAME#v}"
          version="$(python -c 'import ble_lock_session; print(ble_lock_session.__version__)')"
          if [ "$tag" != "$version" ]; then
            echo "Release tag '$GITHUB_REF_NAME' does not match __version__ '$version'." >&2
            echo "Bump __version__ in ble_lock_session.py (or retag) and publish again." >&2
            exit 1
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Must match the environment configured in the PyPI trusted publisher
    environment:
      name: pypi
      url: https://pypi.org/p/ble-lock-session
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
